name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (unsigned)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Package IPA for Sideloadly / 全能签
        working-directory: mobile
        run: |
          set -euo pipefail
          APP="build/ios/iphoneos/Runner.app"
          test -d "$APP"
          test -f "$APP/Info.plist"
          test -f "$APP/Runner"

          # Absolute staging dir
          STAGE="/tmp/phub_payload_$$"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Payload"

          # Preserve symlinks (Flutter.framework)
          /usr/bin/ditto "$APP" "$STAGE/Payload/Runner.app"

          # IPA file name MUST end with .ipa
          IPA_NAME="PHUB-Player-iOS.ipa"
          IPA_PATH="/tmp/$IPA_NAME"
          rm -f "$IPA_PATH"

          # Zip so archive root is exactly: Payload/Runner.app/...
          (
            cd "$STAGE"
            /usr/bin/zip -qr -y "$IPA_PATH" Payload
          )

          # Validate
          ls -lh "$IPA_PATH"
          file "$IPA_PATH"
          python3 <<'PY'
          import zipfile, os, sys
          p = "/tmp/PHUB-Player-iOS.ipa"
          assert p.endswith(".ipa")
          assert os.path.getsize(p) > 2_000_000
          with open(p,"rb") as f:
              assert f.read(2)==b"PK"
          with zipfile.ZipFile(p) as z:
              names=z.namelist()
          print("files:", len(names))
          for n in names[:20]:
              print(" ", n)
          assert "Payload/Runner.app/Info.plist" in names
          assert "Payload/Runner.app/Runner" in names
          assert not any(n.startswith("Payload/Payload/") for n in names)
          # top-level should only be Payload/
          tops=set(n.split("/")[0] for n in names if n)
          assert tops=={"Payload"}, tops
          print("IPA OK for re-sign tools")
          PY

          mkdir -p build/ipa_dist
          # copy with explicit .ipa name (no nested folders)
          cp -f "$IPA_PATH" "build/ipa_dist/$IPA_NAME"
          # also write a tiny marker so download is obvious
          echo "PHUB-Player-iOS.ipa" > build/ipa_dist/FILENAME.txt
          ls -la build/ipa_dist/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          # Artifact name with .ipa helps some UIs
          name: PHUB-Player-iOS.ipa
          path: mobile/build/ipa_dist/PHUB-Player-iOS.ipa
          if-no-files-found: error
          retention-days: 14
