name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS release (no codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Package standard IPA (Payload/Runner.app)
        working-directory: mobile
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Info.plist"
          test -f "$APP_PATH/Runner"

          # Standard IPA layout:
          #   Payload/
          #     Runner.app/
          rm -rf build/ipa_work
          mkdir -p build/ipa_work/Payload
          # -R keeps symlinks inside Flutter.framework (required)
          cp -R "$APP_PATH" build/ipa_work/Payload/Runner.app

          # Zip from inside work dir so root of archive is "Payload/"
          # -y store symlinks as symlinks (critical for Flutter.framework)
          cd build/ipa_work
          rm -f ../PHUB-Player-iOS.ipa
          zip -qry -y ../PHUB-Player-iOS.ipa Payload

          cd ..
          # Force correct extension / size check
          ls -lh PHUB-Player-iOS.ipa
          file PHUB-Player-iOS.ipa

          # Verify ZIP magic + structure
          python3 - <<'PY'
          import zipfile, sys
          path = "PHUB-Player-iOS.ipa"
          z = zipfile.ZipFile(path)
          names = z.namelist()
          print("entries:", len(names))
          print("first 15:")
          for n in names[:15]:
              print(" ", n)
          ok = any(n.startswith("Payload/Runner.app/") for n in names)
          has_plist = "Payload/Runner.app/Info.plist" in names
          has_bin = "Payload/Runner.app/Runner" in names
          print("has Payload/Runner.app:", ok)
          print("has Info.plist:", has_plist)
          print("has Runner binary:", has_bin)
          if not (ok and has_plist and has_bin):
              sys.exit("IPA structure invalid")
          # magic bytes PK
          with open(path, "rb") as f:
              magic = f.read(2)
          assert magic == b"PK", magic
          print("ZIP magic OK")
          PY

      - name: Upload IPA only
        uses: actions/upload-artifact@v4
        with:
          name: PHUB-Player-iOS
          path: mobile/build/PHUB-Player-iOS.ipa
          if-no-files-found: error
          retention-days: 14
