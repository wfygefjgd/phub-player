name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (unsigned)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Make IPA (Payload layout + .ipa name)
        working-directory: mobile
        run: |
          set -euo pipefail
          APP="build/ios/iphoneos/Runner.app"
          test -d "$APP"
          test -x "$APP/Runner" || test -f "$APP/Runner"
          test -f "$APP/Info.plist"

          # Clean workspace
          rm -rf /tmp/phub_ipa
          mkdir -p /tmp/phub_ipa/Payload

          # Copy .app into Payload/ (preserve symlinks)
          /usr/bin/ditto "$APP" /tmp/phub_ipa/Payload/Runner.app

          # Create IPA as a zip whose ROOT entry is "Payload/"
          # Use absolute out path and force .ipa suffix
          OUT="/tmp/phub_ipa/PHUB-Player-iOS.ipa"
          rm -f "$OUT"
          (
            cd /tmp/phub_ipa
            /usr/bin/zip -qry -y "$OUT" Payload
          )

          # Sanity checks
          ls -lh "$OUT"
          file "$OUT"
          python3 <<'PY'
          import zipfile, os, sys
          path = "/tmp/phub_ipa/PHUB-Player-iOS.ipa"
          assert path.endswith(".ipa"), path
          assert os.path.isfile(path) and os.path.getsize(path) > 1_000_000
          with open(path, "rb") as f:
              assert f.read(2) == b"PK", "not a zip/ipa"
          with zipfile.ZipFile(path) as z:
              names = z.namelist()
          print("count", len(names))
          print("sample", names[:12])
          assert any(n.startswith("Payload/Runner.app/") for n in names)
          assert "Payload/Runner.app/Info.plist" in names
          assert "Payload/Runner.app/Runner" in names
          # Must NOT nest as Payload/Payload/...
          assert not any(n.startswith("Payload/Payload/") for n in names)
          print("IPA structure OK")
          PY

          # Copy into repo path for artifact upload
          mkdir -p build/ipa_dist
          cp -f "$OUT" build/ipa_dist/PHUB-Player-iOS.ipa
          ls -lh build/ipa_dist/
          # double-check extension on disk
          python3 -c "import os; p='build/ipa_dist/PHUB-Player-iOS.ipa'; print(p, os.path.splitext(p)[1], os.path.getsize(p))"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PHUB-Player-iOS.ipa
          path: mobile/build/ipa_dist/PHUB-Player-iOS.ipa
          if-no-files-found: error
          retention-days: 14
