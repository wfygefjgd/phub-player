name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/ios-ipa.yml'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS release (device, no codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign

      - name: Package compatible IPA (no symlink zip issues)
        working-directory: mobile
        run: |
          set -euo pipefail
          SRC="build/ios/iphoneos/Runner.app"
          test -d "$SRC"
          test -f "$SRC/Runner"
          test -f "$SRC/Info.plist"

          STAGE="/tmp/phub_ipa_stage_$$"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Payload"

          # Copy app; resolve symlinks into real files (全能签 unzip 常不吃 symlink)
          /usr/bin/ditto -V --norsrc --noextattr --noqtn "$SRC" "$STAGE/Payload/Runner.app"
          # If any symlink remains, materialize
          find "$STAGE/Payload/Runner.app" -type l -print0 | while IFS= read -r -d '' link; do
            target=$(readlink "$link" || true)
            if [ -n "$target" ]; then
              dir=$(dirname "$link")
              # absolute resolve
              if [ -e "$dir/$target" ]; then
                rm -f "$link"
                /usr/bin/ditto "$dir/$target" "$link"
              elif [ -e "$target" ]; then
                rm -f "$link"
                /usr/bin/ditto "$target" "$link"
              else
                echo "WARN dangling symlink: $link -> $target"
                rm -f "$link"
              fi
            fi
          done

          APP="$STAGE/Payload/Runner.app"
          xattr -cr "$APP" || true
          chmod +x "$APP/Runner" || true
          [ -f "$APP/Frameworks/Flutter.framework/Flutter" ] && chmod +x "$APP/Frameworks/Flutter.framework/Flutter"
          [ -f "$APP/Frameworks/App.framework/App" ] && chmod +x "$APP/Frameworks/App.framework/App"

          # Thin to arm64 only
          thin_arm64() {
            local bin="$1"
            [ -f "$bin" ] || return 0
            local info
            info=$(lipo -info "$bin" 2>/dev/null || true)
            echo "lipo $bin : $info"
            if echo "$info" | grep -q "Architectures in the fat file" && echo "$info" | grep -q arm64; then
              lipo -thin arm64 "$bin" -output "${bin}.thin"
              mv "${bin}.thin" "$bin"
              chmod +x "$bin"
            fi
          }
          thin_arm64 "$APP/Runner"
          thin_arm64 "$APP/Frameworks/Flutter.framework/Flutter"
          thin_arm64 "$APP/Frameworks/App.framework/App"
          find "$APP/Frameworks" -type f \( -name "*.dylib" -o -perm -111 \) 2>/dev/null | while read -r f; do
            thin_arm64 "$f" || true
          done

          # Confirm no symlinks left
          if find "$APP" -type l | grep -q .; then
            echo "ERROR: symlinks still present:"
            find "$APP" -type l
            exit 1
          fi

          # Zip with Python for max ZIP-tool compatibility (no symlink, standard local headers)
          IPA_OUT="/tmp/PHUB-Player-iOS.ipa"
          rm -f "$IPA_OUT"
          python3 <<'PY'
          import os, zipfile, stat
          stage = os.environ.get("STAGE")
          # STAGE not exported; hardcode from shell via write
          PY
          export STAGE
          python3 <<PY
          import os, zipfile, stat
          stage = "$STAGE"
          ipa = "/tmp/PHUB-Player-iOS.ipa"
          root = os.path.join(stage, "Payload")
          assert os.path.isdir(root)
          # ZIP_DEFLATED, allowZip64, strict timestamps
          with zipfile.ZipFile(ipa, "w", compression=zipfile.ZIP_DEFLATED, allowZip64=True) as zf:
              for dirpath, dirnames, filenames in os.walk(root):
                  # stable order
                  dirnames.sort()
                  filenames.sort()
                  rel_dir = os.path.relpath(dirpath, stage).replace("\\\\", "/")
                  if rel_dir == ".":
                      rel_dir = ""
                  # directory entry
                  if rel_dir:
                      entry = rel_dir.replace("\\\\", "/").rstrip("/") + "/"
                      # only add Payload/ and subdirs once via walk
                      zinfo = zipfile.ZipInfo(entry)
                      zinfo.external_attr = (0o755 << 16) | 0x10
                      zf.writestr(zinfo, b"")
                  for name in filenames:
                      full = os.path.join(dirpath, name)
                      arc = os.path.relpath(full, stage).replace("\\\\", "/")
                      # skip any accidental symlink
                      if os.path.islink(full):
                          print("skip link", full)
                          continue
                      zinfo = zipfile.ZipInfo.from_file(full, arc)
                      # force unix perms
                      mode = os.stat(full).st_mode
                      if os.access(full, os.X_OK) or name in ("Runner", "Flutter", "App") or name.endswith(".dylib"):
                          zinfo.external_attr = (0o755 << 16)
                      else:
                          zinfo.external_attr = (0o644 << 16)
                      zinfo.compress_type = zipfile.ZIP_DEFLATED
                      with open(full, "rb") as f:
                          zf.writestr(zinfo, f.read())
          print("wrote", ipa, os.path.getsize(ipa))
          PY

          ls -lh /tmp/PHUB-Player-iOS.ipa
          file /tmp/PHUB-Player-iOS.ipa

          python3 <<'PY'
          import zipfile, os, sys
          p = "/tmp/PHUB-Player-iOS.ipa"
          assert p.endswith(".ipa")
          assert os.path.getsize(p) > 3_000_000
          with open(p, "rb") as f:
              assert f.read(2) == b"PK"
          with zipfile.ZipFile(p) as z:
              # test CRC of every member (catches bad local headers)
              bad = z.testzip()
              assert bad is None, f"bad crc: {bad}"
              names = z.namelist()
          print("entries", len(names))
          for n in names[:20]:
              print(" ", n)
          assert "Payload/Runner.app/Info.plist" in names
          assert "Payload/Runner.app/Runner" in names
          tops = {n.split("/")[0] for n in names if n}
          assert tops == {"Payload"}, tops
          # no symlink flag entries ideally
          print("ZIP testzip OK")
          PY

          mkdir -p build/ipa_dist
          cp -f /tmp/PHUB-Player-iOS.ipa build/ipa_dist/PHUB-Player-iOS.ipa
          ls -la build/ipa_dist/
          # also produce .zip copy with same bytes (some tools prefer picking zip then rename)
          cp -f build/ipa_dist/PHUB-Player-iOS.ipa build/ipa_dist/PHUB-Player-iOS.zip
          # manifest
          python3 - <<'PY'
          import os, hashlib
          p = "build/ipa_dist/PHUB-Player-iOS.ipa"
          h = hashlib.sha256(open(p,"rb").read()).hexdigest()
          open("build/ipa_dist/SHA256.txt","w").write(h + "  PHUB-Player-iOS.ipa\n")
          print(h, os.path.getsize(p))
          PY

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PHUB-Player-iOS.ipa
          path: |
            mobile/build/ipa_dist/PHUB-Player-iOS.ipa
            mobile/build/ipa_dist/SHA256.txt
          if-no-files-found: error
          retention-days: 14
