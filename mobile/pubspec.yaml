publish_to: "none"
version: 1.7.1+27

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  html: ^0.15.5
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  wakelock_plus: 1.6.1
  provider: ^6.1.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
